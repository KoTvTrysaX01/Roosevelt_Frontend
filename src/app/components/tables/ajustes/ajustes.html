<div class="my-2 p-2 bg-secondary rounded rounded-2">
  <div class="d-flex justify-content-between align-items-center mb-1">
    <span class="fs-2 text-light fw-bold">Ajustes</span>
  </div>
  <table class="table table-bordered table-striped fs-5">
    <thead class="table-primary">
      <tr>
        @for (item of dataValues; track $index) {
          <th>{{ item }}</th>
        }
      </tr>
    </thead>
    <tbody>
      @for (item of dataArray; track $index) {
        <tr>
          <td>
            <a [routerLink]="['form/zona?ver', '{{item.id}}']">{{ item.id }}</a>
          </td>
          <td>
            <a [routerLink]="['form/zona?ver', '{{item.id}}']">{{ item.usuario.id }}</a>
          </td>
          <td>{{ item.tema }}</td>
          <td>{{ item.idioma }}</td>
          <td>{{ item.foto }}</td>
          <td>{{ item.recibir_noticias }}</td>
          <td>{{ item.recibir_notificaciones }}</td>
          <td>
            <div class="d-flex justify-content-center">
              <button class="btn btn-primary-light mx-2 px-4" [routerLink]="['/admin']">Ver</button>
              <button class="btn btn-danger mx-2 px-3" (click)="({})">Borrar</button>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
