<div class="my-2 p-2 bg-success rounded rounded-2">
  <div class="table-responsive">
    <div class="d-flex justify-content-start justify-content-lg-between align-items-center mb-1">
      <span class="fs-2 text-light fw-bold pe-3">Solicitudes</span>
    </div>
    <table class="table table-bordered table-striped">
      <thead class="table-success">
        <tr>
          @for (item of dataValues; track $index) {
            <th>{{ item }}</th>
          }
        </tr>
      </thead>
      <tbody>
        @for (item of dataArray; track $index) {
          <tr>
            <td>
              <a [routerLink]="[`/admin/usuarios`, item.solicitudId.usuario.id]">{{
                item.solicitudId.usuario.id
              }}</a>
            </td>
            <td>
              <a [routerLink]="[`/admin/rutas`, item.solicitudId.ruta.id]">{{
                item.solicitudId.ruta.id
              }}</a>
            </td>
            <td>{{ item.fecha_pub }}</td>

            <td>
              <div class="d-flex justify-content-center">
                <button
                  class="btn btn-success mx-2 px-3"
                  (click)="openDecisionModal(item, 'Acceptar')"
                >
                  Acceptar
                </button>
                <button
                  class="btn btn-danger mx-2 px-3"
                  (click)="openDecisionModal(item, 'Denegar')"
                >
                  Borrar
                </button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

<div class="modal" id="decisionModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header d-flex justify-content-center">
        <h4>{{ titulo }} el solicitud?</h4>
      </div>
      <div class="modal-body">
        <div class="d-flex justify-content-evenly">
          <button class="btn btn-lg btn-danger" (click)="makeDecision()">{{titulo}}</button>
          <button class="btn btn-lg btn-success" (click)="closeDecisionModal()">Cancelar</button>
        </div>
      </div>
    </div>
  </div>
</div>
