<section class="my-5">
  <div class="d-flex align-items-center h-100">
    <div class="container h-100">
      <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col-12 col-md-9 col-lg-7 col-xl-6">
          <div class="card">
            <div class="card-body py-5">
              <h2 class="text-uppercase text-center mb-5">Recuperar la contraseña</h2>

              <form class="row">
                <div class="form-outline mb-4">
                  <input type="email" id="username_field" class="form-control form-control-lg" />
                  <label class="form-label" for="username_field">Email</label>
                </div>

                <div class="d-flex justify-content-center">
                  <button
                    type="submit"
                    class="btn btn-primary-light text-light btn-block btn-lg gradient-custom-4 w-100"
                  >
                    Recuperar
                  </button>
                </div>

                <p class="text-center text-muted mt-5 mb-0">
                  Registrar nueva cuenta 
                  <a href="/auth/register" class="fw-bold text-primary" routerLink="/register"><u>Crear una cuenta</u></a>
                </p>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
