<section class="d-flex py-md-5 bg-light align-items-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="bg-form py-4 py-md-5 rounded-4 shadow border col-xl-8">
        @if (authService.currentUserSig() === null) {
          <div class="text-center mb-4 mb-md-5">
            <p class="text-uppercase fw-bold text-primary fs-4 fs-md-3">Bienvenido!</p>
            <h2 class="title-login fw-bold text-primary fs-4 fs-md-3">Accede a tu cuenta</h2>
          </div>
          <!-- {{ active == 'login' ? 'active' : '' }} -->
          <div>
            <ul class="nav nav-pills nav-justified">
              <li class="nav-item">
                <a
                  class="nav-link fs-3"
                  aria-current="page"
                  routerLink="login"
                  routerLinkActive="active"
                  (click)="changeTab('login')"
                  >Entrar</a
                >
              </li>
              <li routerLinkActive="active" class="nav-item">
                <a
                  class="nav-link fs-3"
                  aria-current="page"
                  routerLink="register"
                  routerLinkActive="active"
                  (click)="changeTab('register')"
                  >Registrarse</a
                >
              </li>
              <li routerLinkActive="active" class="nav-item">
                <a
                  class="nav-link fs-3"
                  aria-current="page"
                  routerLink="recover"
                  routerLinkActive="active"
                  (click)="changeTab('recover')"
                  >Recuperar</a
                >
              </li>
            </ul>
          </div>
          <div>
            <router-outlet></router-outlet>
          </div>
        } @else {
          <div class="text-center mb-4 mb-md-5">
            <p class="text-uppercase fw-bold text-primary fs-4 fs-md-3">
              Bienvenido, {{ authService.currentUserSig()?.user }}
            </p>
            <h2 class="title-login fw-bold text-primary fs-4 fs-md-3">¿Quieres cerrar sesión?</h2>
          </div>
          <div class="d-flex w-100 justify-content-center">
            <button class="btn btn-lg btn-primary fs-2" (click)="logout()">Cerrar sessión</button>
          </div>
        }
      </div>
    </div>
  </div>
</section>
